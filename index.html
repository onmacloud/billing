<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Billing">
<title>⏱️ Billing</title>
</head>
<body>
<script type="module">

const firebaseConfig = {
  apiKey: "AIzaSyDg2i2fcebs1RpCNgP1i_LeIKjh_mmP0AQ",
  authDomain: "billing-bf815.firebaseapp.com",
  projectId: "billing-bf815",
  storageBucket: "billing-bf815.firebasestorage.app",
  messagingSenderId: "553516388461",
  appId: "1:553516388461:web:fe118b157dfa1d30c36f64"
};

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, writeBatch, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const UKONY = ['tel stav','tel con','m stav','m con','int','tel jed','m jed','soud','výslech','revize','studium spisu','právní rešerše','sepis podání','sepis smlouvy','právní analýza'];
const CASY  = ['0:15','0:30','0:45','1:00','1:30','2:00','vlastní'];

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

let selUkon = null, selTime = null;

document.body.innerHTML = `
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--amber:#BA7517;--amber-dark:#854F0B;--bg:#f9f8f6;--surface:#ffffff;--border:#e2e0d8;--text:#1a1916;--muted:#888780;--danger:#c0392b;--r:8px;--font:-apple-system,'Helvetica Neue',sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#1c1b19;--surface:#252420;--border:#3a3830;--text:#f0ede6}}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
.app{max-width:480px;margin:0 auto;padding:1rem}
header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0 1.25rem;border-bottom:.5px solid var(--border);margin-bottom:1.1rem}
header h1{font-size:17px;font-weight:600}
#dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .4s}
#dot.ok{background:#2ecc71}#dot.err{background:var(--danger)}#dot.spin{background:var(--amber)}
.lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;margin-top:1rem}
input[type=text]{width:100%;padding:9px 11px;border:.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--surface);color:var(--text);outline:none;-webkit-appearance:none}
input[type=text]:focus{border-color:var(--amber)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:12.5px;padding:5px 9px;border:.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);cursor:pointer}
.chip.sel{background:var(--amber);border-color:var(--amber);color:#fff}
.chip.time{min-width:44px;text-align:center}
#ci{display:none;margin-top:7px;width:120px}
#add{width:100%;margin-top:1.1rem;padding:11px;background:var(--amber);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer}
#add:disabled{opacity:.3}
hr{border:none;border-top:.5px solid var(--border);margin:1.4rem 0}
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.rl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.rt{font-size:12px;color:var(--muted)}
.ri{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--border);margin-bottom:5px;background:var(--surface)}
.rm{font-size:13px}.rs{font-size:10.5px;color:var(--muted);margin-top:2px}
.dx{background:none;border:none;color:var(--muted);cursor:pointer;font-size:19px;padding:2px 6px;line-height:1}
.rb{display:flex;gap:8px;margin-top:10px}
.rb button{flex:1;padding:8px;font-size:13px;border:.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);cursor:pointer}
.rb .d{color:var(--danger);border-color:var(--danger)}
.empty{font-size:13px;color:var(--muted);text-align:center;padding:1.2rem 0}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1916;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:100}
#toast.show{opacity:1}
</style>
<div class="app">
  <header><h1>⏱️ Billing</h1><div id="dot"></div></header>
  <span class="lbl">kauza</span>
  <input type="text" id="kauza" placeholder="Novák, ABC s.r.o., ...">
  <span class="lbl">úkon</span>
  <div class="chips" id="ug"></div>
  <span class="lbl">čas</span>
  <div class="chips" id="tg"></div>
  <input type="text" id="ci" class="chip" placeholder="vlastní (0:45)">
  <span class="lbl">popis</span>
  <input type="text" id="popis" placeholder="krátký popis (volitelné)">
  <button id="add" disabled>+ přidat záznam</button>
  <hr>
  <div class="rh"><span class="rl">záznamy</span><span class="rt" id="tot"></span></div>
  <div id="list"></div>
  <div class="rb" id="act" style="display:none">
    <button onclick="copyAll()">kopírovat vše</button>
    <button class="d" onclick="delAll()">smazat vše</button>
  </div>
</div>
<div id="toast"></div>`;

function dot(s){document.getElementById('dot').className=s}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function today(){const d=new Date();return`${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`}
function nowt(){const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function t2m(s){const[h,m]=(s||'0:0').split(':').map(Number);return h*60+(m||0)}
function m2t(m){return`${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`}
function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

const ug=document.getElementById('ug');
UKONY.forEach(u=>{
  const b=document.createElement('button');b.className='chip';b.textContent=u;
  b.onclick=()=>{selUkon=u;ug.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');chk()};
  ug.appendChild(b);
});

const tg=document.getElementById('tg');
const ci=document.getElementById('ci');
CASY.forEach(t=>{
  const b=document.createElement('button');b.className='chip time';b.textContent=t;
  b.onclick=()=>{
    tg.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');
    if(t==='vlastní'){ci.style.display='block';selTime=ci.value.trim()||null;setTimeout(()=>ci.focus(),50)}
    else{ci.style.display='none';selTime=t}
    chk();
  };
  tg.appendChild(b);
});
ci.oninput=()=>{selTime=ci.value.trim()||null;chk()};
document.getElementById('kauza').oninput=chk;
function chk(){document.getElementById('add').disabled=!(document.getElementById('kauza').value.trim()&&selUkon&&selTime)}

document.getElementById('add').onclick=async()=>{
  const k=document.getElementById('kauza').value.trim();
  const p=document.getElementById('popis').value.trim();
  dot('spin');
  try{
    await addDoc(collection(db,'records'),{kauza:k,ukon:selUkon,cas:selTime,popis:p,ts:Date.now(),date:today(),time:nowt()});
    toast('zapsáno ✓');
    selUkon=null;selTime=null;
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));
    ci.style.display='none';ci.value='';document.getElementById('popis').value='';chk();
  }catch(e){toast('chyba: '+e.message);dot('err')}
};

const q=query(collection(db,'records'),orderBy('ts'));
onSnapshot(q,snap=>{
  const recs=snap.docs.map(d=>({id:d.id,...d.data()}));
  const list=document.getElementById('list');
  const act=document.getElementById('act');
  const tot=document.getElementById('tot');
  if(!recs.length){list.innerHTML='<div class="empty">žádné záznamy</div>';act.style.display='none';tot.textContent='';dot('ok');return}
  act.style.display='flex';
  let mins=0;recs.forEach(r=>{try{mins+=t2m(r.cas)}catch(e){}});
  tot.textContent=`celkem ${m2t(mins)}`;
  list.innerHTML=recs.map(r=>`<div class="ri"><div><div class="rm">${esc(r.kauza)} | ${esc(r.ukon)} | ${esc(r.cas)}${r.popis?' | '+esc(r.popis):''}</div><div class="rs">${esc(r.date)} ${esc(r.time)}</div></div><button class="dx" onclick="delOne('${r.id}')">×</button></div>`).join('');
  dot('ok');
},e=>{dot('err');console.error(e)});

window.delOne=async id=>{try{await deleteDoc(doc(db,'records',id))}catch(e){toast('chyba')}};
window.copyAll=()=>{
  const items=[...document.querySelectorAll('.rm')].map(r=>r.textContent);
  navigator.clipboard.writeText(items.join('\n')).then(()=>toast('zkopírováno ✓'));
};
window.delAll=async()=>{
  if(!confirm('Smazat všechny záznamy?'))return;
  const snap=await getDocs(collection(db,'records'));
  const batch=writeBatch(db);snap.docs.forEach(d=>batch.delete(d.ref));await batch.commit();
};

</script>
</body>
</html>
